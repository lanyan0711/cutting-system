<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相機開啟測試-標準版</title>
    <!-- 正確引入的核心相機工具 -->
    <script src="https://unpkg.com/html5QrcodeScanner"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 15px; background-color: #f0f2f5; }
        /* 預留一個黑色相機區域，套件會把相機畫面硬生生塞進這個藍框框裡 */
        #camera-preview { width: 100%; max-width: 320px; min-height: 250px; margin: 20px auto; border: 3px solid #007bff; border-radius: 10px; overflow: hidden; background: black; }
    </style>
</head>
<body>

    <h2>📷 最簡相機開啟功能測試 (標準版)</h2>
    <p>網頁載入後，系統會自動在下方藍框準備相機：</p>

    <!-- 🌟 套件會自動在這個 div 內部生成「要求相機權限」的按鈕，不需要我們手動寫 button -->
    <div id="camera-preview"></div>

    <script>
        // 網頁一打開，立刻執行初始化
        window.onload = function() {
            // 1. 初始化掃描器物件，綁定到畫面的 camera-preview 區塊
            // fps 設為 10，qrbox 設為 200 (掃描雷達框大小)
            const html5QrcodeScanner = new Html5QrcodeScanner("camera-preview", { fps: 10, qrbox: 200 });
            
            // 2. 讓套件自己去渲染並在框框內產生啟動按鈕
            html5QrcodeScanner.render(onSuccess, onError);
        };

        // 當鏡頭對準條碼、掃描到內容時會彈出的提示
        function onSuccess(decodedText) {
            alert("🎉 成功讀取條碼內容：" + decodedText);
        }

        // 尋找條碼中，實務上直接忽略錯誤不影響運行
        function onError(err) {}
    </script>
</body>
</html>
