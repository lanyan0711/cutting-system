<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相機開啟測試</title>
    <!-- 引入核心相機工具 -->
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        /* 測試按鈕樣式 */
        .btn-test { font-size: 24px; font-weight: bold; padding: 20px 40px; background-color: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        /* 相機畫面外框 */
        #camera-preview { width: 100%; max-width: 320px; margin: 20px auto; border: 3px solid #007bff; border-radius: 10px; overflow: hidden; background: black; }
    </style>
</head>
<body>

    <h2>📷 最簡相機開啟功能測試</h2>
    <p>請點擊下方綠色按鈕觸發相機權限：</p>

    <!-- 點擊觸發開相機的按鈕 -->
    <button class="btn-test" onclick="openTestCamera()">【點我打開相機】</button>

    <!-- 相機畫面呈現的區塊 -->
    <div id="camera-preview"></div>

    <script>
        function openTestCamera() {
            // 1. 初始化掃描器物件，綁定到畫面的 camera-preview 區塊
            const html5QrcodeScanner = new Html5QrcodeScanner("camera-preview", { fps: 10, qrbox: 200 });
            
            // 2. 啟動鏡頭（成功時執行，失敗時執行）
            html5QrcodeScanner.render(onSuccess, onError);
        }

        // 掃描到條碼時會執行的動作
        function onSuccess(decodedText) {
            alert("🎉 成功讀取條碼內容：" + decodedText);
        }

        // 尋找條碼中，實務上直接忽略錯誤不影響運行
        function onError(err) {}
    </script>
</body>
</html>
